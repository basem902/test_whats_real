<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الوكيل العقاري - لوحة تحكم المدير</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>* { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Quick Action (from WhatsApp link) -->
<div id="quickAction" class="hidden fixed inset-0 bg-gradient-to-bl from-teal-700 to-emerald-800 flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-4 p-8 text-center">
    <div id="qaLoading">
      <div class="text-5xl mb-4 animate-bounce">⏳</div>
      <h2 class="text-xl font-bold text-gray-800">جاري المعالجة...</h2>
    </div>
    <div id="qaResult" class="hidden">
      <div id="qaIcon" class="text-5xl mb-4"></div>
      <h2 id="qaTitle" class="text-xl font-bold mb-2"></h2>
      <p id="qaMsg" class="text-gray-500 mb-4"></p>
      <a href="admin.html" class="inline-block bg-teal-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-700 transition">
        فتح لوحة التحكم
      </a>
    </div>
  </div>
</div>

<!-- Admin Login -->
<div id="adminLogin" class="fixed inset-0 bg-gradient-to-bl from-teal-700 to-emerald-800 flex items-center justify-center">
  <div class="bg-white rounded-3xl shadow-2xl max-w-md w-full mx-4 overflow-hidden">
    <div class="bg-gradient-to-l from-red-600 to-red-700 p-6 text-white text-center">
      <div class="text-4xl mb-2">🛡️</div>
      <h1 class="text-xl font-extrabold">لوحة تحكم المدير</h1>
      <p class="text-red-200 text-sm mt-1">منصة اختبار الوكيل العقاري الذكي</p>
    </div>
    <div class="p-6">
      <label class="block text-sm font-bold text-gray-600 mb-2">رقم الجوال</label>
      <input type="tel" id="adminPhone" placeholder="966544711074" dir="ltr"
        class="w-full border-2 rounded-xl px-4 py-3 text-center font-bold focus:border-teal-500 focus:outline-none mb-4">
      <button onclick="adminLogin()" class="w-full bg-red-600 text-white py-3.5 rounded-xl font-bold text-lg hover:bg-red-700 transition">
        دخول
      </button>
      <p id="adminError" class="text-red-500 text-sm mt-2 hidden text-center"></p>
    </div>
  </div>
</div>

<!-- Admin Dashboard -->
<div id="adminDash" class="hidden">
  <header class="bg-gradient-to-l from-red-700 to-red-600 text-white shadow-lg">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-extrabold">🛡️ لوحة تحكم المدير</h1>
        <p class="text-red-200 text-sm">ادارة طلبات الدخول - الوكيل العقاري</p>
      </div>
      <div class="flex gap-2">
        <a href="index.html" class="bg-white/10 px-4 py-2 rounded-lg text-sm hover:bg-white/20 transition">
          ← العودة للمنصة
        </a>
        <button onclick="loadRequests()" class="bg-white/10 px-4 py-2 rounded-lg text-sm hover:bg-white/20 transition">
          🔄 تحديث
        </button>
      </div>
    </div>
  </header>

  <!-- Stats -->
  <div class="max-w-4xl mx-auto px-4 py-4">
    <div class="grid grid-cols-4 gap-3 mb-6">
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-center">
        <div id="sPending" class="text-2xl font-extrabold text-yellow-600">0</div>
        <div class="text-xs text-yellow-700 font-bold">معلق</div>
      </div>
      <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
        <div id="sApproved" class="text-2xl font-extrabold text-green-600">0</div>
        <div class="text-xs text-green-700 font-bold">مقبول</div>
      </div>
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 text-center">
        <div id="sRejected" class="text-2xl font-extrabold text-red-600">0</div>
        <div class="text-xs text-red-700 font-bold">مرفوض</div>
      </div>
      <div class="bg-teal-50 border border-teal-200 rounded-xl p-4 text-center">
        <div id="sUsers" class="text-2xl font-extrabold text-teal-600">0</div>
        <div class="text-xs text-teal-700 font-bold">مستخدم معتمد</div>
      </div>
    </div>

    <!-- Pending Requests -->
    <h2 class="text-lg font-bold text-gray-800 mb-3">طلبات معلقة</h2>
    <div id="pendingList" class="space-y-3 mb-8"></div>

    <!-- All Requests -->
    <h2 class="text-lg font-bold text-gray-800 mb-3">كل الطلبات</h2>
    <div id="allList" class="space-y-3 mb-8"></div>

    <!-- Approved Users -->
    <h2 class="text-lg font-bold text-gray-800 mb-3">المستخدمين المعتمدين</h2>
    <div id="usersList" class="space-y-3"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://npbqluoqauaftynqfacu.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5wYnFsdW9xYXVhZnR5bnFmYWN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjE2NDUsImV4cCI6MjA5MDYzNzY0NX0.SBkdjjQ7ixe2CcrzNW7gNU5TQDU8DBd1FdcrMFkqT2c';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const params = new URLSearchParams(window.location.search);
const action = params.get('action');
const reqId = params.get('id');
const reqToken = params.get('token');

if (action && reqId) {
  document.getElementById('quickAction').classList.remove('hidden');
  document.getElementById('adminLogin').classList.add('hidden');
  processQuickAction(action, reqId, reqToken);
}

async function processQuickAction(action, id, token) {
  try {
    const newStatus = action === 'approve' ? 'approved' : 'rejected';
    const { data: req } = await sb.from('access_requests')
      .select('*').eq('id', id).single();
    if (!req) throw new Error('الطلب غير موجود');

    await sb.from('access_requests').update({
      status: newStatus,
      session_token: token || req.session_token
    }).eq('id', id);

    if (newStatus === 'approved') {
      await sb.from('approved_users').upsert({
        phone: req.phone, name: req.name, last_login: new Date().toISOString()
      }, { onConflict: 'phone' });
      await sendWhatsApp(req.phone,
        `✅ *تمت الموافقة على طلبك!*\n\nمرحبا ${req.name}،\nتم قبول طلب دخولك لمنصة اختبار الوكيل العقاري الذكي.\n\nيمكنك الدخول الان.`
      );
    } else {
      await sendWhatsApp(req.phone,
        `❌ *تم رفض طلب الدخول*\n\nعذرا ${req.name}،\nتم رفض طلب دخولك. تواصل مع المدير للمزيد.`
      );
    }

    document.getElementById('qaLoading').classList.add('hidden');
    const result = document.getElementById('qaResult');
    result.classList.remove('hidden');
    document.getElementById('qaIcon').textContent = newStatus === 'approved' ? '✅' : '❌';
    document.getElementById('qaTitle').textContent = newStatus === 'approved' ? 'تمت الموافقة' : 'تم الرفض';
    document.getElementById('qaTitle').className = `text-xl font-bold mb-2 ${newStatus === 'approved' ? 'text-green-600' : 'text-red-600'}`;
    document.getElementById('qaMsg').textContent = newStatus === 'approved'
      ? `تم قبول ${req.name} (${req.phone}) وارسال اشعار واتساب.`
      : `تم رفض ${req.name} (${req.phone}) وارسال اشعار واتساب.`;
  } catch (e) {
    document.getElementById('qaLoading').classList.add('hidden');
    const result = document.getElementById('qaResult');
    result.classList.remove('hidden');
    document.getElementById('qaIcon').textContent = '⚠️';
    document.getElementById('qaTitle').textContent = 'خطأ';
    document.getElementById('qaMsg').textContent = e.message;
  }
}

async function sendWhatsApp(phone, message) {
  try { await sb.rpc('send_whatsapp', { p_phone: phone, p_message: message }); } catch (e) { console.error(e); }
}

async function adminLogin() {
  const phone = document.getElementById('adminPhone').value.replace(/[^0-9]/g, '');
  const err = document.getElementById('adminError');
  const { data } = await sb.from('approved_users')
    .select('*').eq('phone', phone).eq('is_admin', true).single();
  if (!data) {
    err.textContent = 'ليس لديك صلاحية مدير';
    err.classList.remove('hidden');
    return;
  }
  localStorage.setItem('admin_phone', phone);
  document.getElementById('adminLogin').classList.add('hidden');
  document.getElementById('adminDash').classList.remove('hidden');
  loadRequests();
}

if (localStorage.getItem('admin_phone') && !action) {
  document.getElementById('adminLogin').classList.add('hidden');
  document.getElementById('adminDash').classList.remove('hidden');
  loadRequests();
}

async function loadRequests() {
  const { data: requests } = await sb.from('access_requests')
    .select('*').order('created_at', { ascending: false }).limit(50);
  const { data: users } = await sb.from('approved_users')
    .select('*').order('created_at', { ascending: false });

  const pending = (requests || []).filter(r => r.status === 'pending' && r.otp_verified);
  const all = requests || [];

  document.getElementById('sPending').textContent = pending.length;
  document.getElementById('sApproved').textContent = all.filter(r => r.status === 'approved').length;
  document.getElementById('sRejected').textContent = all.filter(r => r.status === 'rejected').length;
  document.getElementById('sUsers').textContent = (users || []).length;

  const pendingEl = document.getElementById('pendingList');
  if (pending.length === 0) {
    pendingEl.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">لا توجد طلبات معلقة</p>';
  } else {
    pendingEl.innerHTML = pending.map(r => `
      <div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 flex items-center justify-between flex-wrap gap-3">
        <div>
          <span class="font-bold text-gray-800">${r.name}</span>
          <span class="text-gray-500 text-sm mr-2" dir="ltr">${r.phone}</span>
          <span class="text-xs text-gray-400 mr-2">${new Date(r.created_at).toLocaleString('ar-SA')}</span>
        </div>
        <div class="flex gap-2">
          <button onclick="handleRequest('${r.id}','approve','${r.session_token}')"
            class="bg-green-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-green-700 transition text-sm">
            ✅ قبول
          </button>
          <button onclick="handleRequest('${r.id}','reject','${r.session_token}')"
            class="bg-red-600 text-white px-5 py-2 rounded-lg font-bold hover:bg-red-700 transition text-sm">
            ❌ رفض
          </button>
        </div>
      </div>
    `).join('');
  }

  document.getElementById('allList').innerHTML = all.slice(0, 20).map(r => {
    const statusColors = { pending: 'yellow', approved: 'green', rejected: 'red' };
    const statusLabels = { pending: 'معلق', approved: 'مقبول', rejected: 'مرفوض' };
    const c = statusColors[r.status];
    return `
      <div class="bg-white border rounded-xl p-3 flex items-center justify-between text-sm">
        <div class="flex items-center gap-3">
          <span class="bg-${c}-100 text-${c}-700 px-2 py-1 rounded-full text-xs font-bold">${statusLabels[r.status]}</span>
          <span class="font-bold">${r.name}</span>
          <span class="text-gray-400" dir="ltr">${r.phone}</span>
        </div>
        <span class="text-gray-400 text-xs">${new Date(r.created_at).toLocaleString('ar-SA')}</span>
      </div>
    `;
  }).join('');

  document.getElementById('usersList').innerHTML = (users || []).map(u => `
    <div class="bg-white border rounded-xl p-3 flex items-center justify-between text-sm">
      <div class="flex items-center gap-3">
        ${u.is_admin ? '<span class="bg-red-100 text-red-700 px-2 py-1 rounded-full text-xs font-bold">مدير</span>' : '<span class="bg-teal-100 text-teal-700 px-2 py-1 rounded-full text-xs font-bold">مختبر</span>'}
        <span class="font-bold">${u.name}</span>
        <span class="text-gray-400" dir="ltr">${u.phone}</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-gray-400 text-xs">${u.last_login ? new Date(u.last_login).toLocaleString('ar-SA') : 'لم يدخل بعد'}</span>
        ${!u.is_admin ? `<button onclick="toggleUser('${u.phone}', ${!u.is_active})" class="text-xs px-2 py-1 rounded ${u.is_active ? 'bg-red-50 text-red-600 hover:bg-red-100' : 'bg-green-50 text-green-600 hover:bg-green-100'}">${u.is_active ? 'تعطيل' : 'تفعيل'}</button>` : ''}
      </div>
    </div>
  `).join('');
}

async function handleRequest(id, action, token) {
  await processQuickAction(action, id, token);
  loadRequests();
}

async function toggleUser(phone, newState) {
  await sb.from('approved_users').update({ is_active: newState }).eq('phone', phone);
  loadRequests();
}

setInterval(() => {
  if (!document.getElementById('adminDash').classList.contains('hidden')) {
    loadRequests();
  }
}, 10000);
</script>
</body>
</html>
